server.port=${PORT:8080}
spring.application.name=stock-portfolio-tracker

# API keys
alphavantage.apikey=${ALPHAVANTAGE_APIKEY:}
groq.apikey=${GROQ_APIKEY:}

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:portfoliodb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Price refresh interval (ms) — default 24 hours
price.refresh.interval=86400000
